appId: host.exp.exponent
---
- launchApp:
    clearState: true
- openLink: ${EXPO_URL}
- runFlow:
    when:
      visible: "Development servers"
    commands:
      - tapOn: "exp://.*:8081"
- runFlow:
    when:
      visible: "vibetribe"
    commands:
      - tapOn: "vibetribe"
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
- runFlow:
    when:
      visible: "Go home"
    commands:
      - tapOn: "Go home"
- extendedWaitUntil:
    visible: "Bienvenido de nuevo"
    timeout: 30000
- tapOn: "Crea una"
- assertVisible: "Crea tu cuenta"
- tapOn: "Juan Pérez"
- inputText: "${E2E_NAME}"
- tapOn: "correo@ejemplo.com"
- inputText: "${E2E_EMAIL}"
- tapOn: "••••••••"
- inputText: "${E2E_PASSWORD}"
- tapOn: "Crear Cuenta"
- assertVisible: "Home"
- tapOn: "Settings"
- tapOn: "Sign Out"
- assertVisible: "Bienvenido de nuevo"
- tapOn: "correo@ejemplo.com"
- inputText: "${E2E_EMAIL}"
- tapOn: "••••••••"
- inputText: "${E2E_PASSWORD}"
- tapOn: "Iniciar Sesión"
- assertVisible: "Home"
