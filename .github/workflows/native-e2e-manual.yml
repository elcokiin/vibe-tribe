name: native-e2e-manual

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_PUBLIC_SERVER_URL: https://vibetribe-server.vercel.app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run native e2e tests
        run: bun run --cwd apps/native test:e2e
