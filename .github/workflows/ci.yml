name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vibetribe
      BETTER_AUTH_SECRET: this-is-a-ci-placeholder-secret-with-32-chars
      BETTER_AUTH_URL: https://vibetribe-server.vercel.app
      CORS_ORIGIN: https://vibetribe-web.vercel.app
      PUBLIC_SERVER_URL: https://vibetribe-server.vercel.app
      EXPO_PUBLIC_SERVER_URL: https://vibetribe-server.vercel.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check-types

      - name: Build workspace
        run: bun run build

      - name: Run native unit tests
        run: bun run --cwd apps/native test -- --ci
