name: smoke-prod

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  contents: read

jobs:
  smoke-prod:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for Vercel deployment
        run: sleep 30

      - name: Check vibetribe-server health
        run: |
          for i in {1..8}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://vibetribe-server.vercel.app/)
            if [ "$code" = "200" ]; then
              echo "server ok"
              exit 0
            fi
            echo "server not ready (status $code), retry $i/8"
            sleep 15
          done
          echo "server healthcheck failed"
          exit 1

      - name: Check vibetribe-web health
        run: |
          for i in {1..8}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://vibetribe-web.vercel.app/)
            if [ "$code" = "200" ]; then
              echo "web ok"
              exit 0
            fi
            echo "web not ready (status $code), retry $i/8"
            sleep 15
          done
          echo "web healthcheck failed"
          exit 1
