# Reduce memory usage at the cost of performance
smol = true

[install]
# Hoisted uses a single shared node_modules — much better for monorepos
linker = "hoisted"

# Use frozen lockfile — skips resolution entirely, just installs from bun.lockb
frozenLockfile = true

# Keep optional dependencies enabled; some build-time native packages
# (for example lightningcss used by uniwind/tailwind) are distributed this way.
optional = true
